<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本地媒体播放器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
  background: #1a1a2e;
  color: #eee;
  height: 100vh;
  padding: 8px;
  overflow: hidden;
}
.main-layout {
  display: flex;
  gap: 12px;
  height: 100%;
}
/* 左侧播放器 */
.player-panel {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  background: #16213e;
  border-radius: 12px;
  padding: 12px;
  overflow: hidden;
}
.drop-zone {
  border: 2px dashed #e94560;
  border-radius: 12px;
  padding: 40px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.drop-zone:hover, .drop-zone.dragover {
  background: rgba(233,69,96,0.1);
  border-color: #ff6b6b;
}
.drop-zone p { font-size: 1.1em; color: #aaa; }
.drop-zone .icon { font-size: 3em; margin-bottom: 10px; }
#mediaWrapper { display: none; flex: 1; flex-direction: column; min-height: 0; }
#mediaContainer {
  position: relative;
  flex: 1;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  border-radius: 8px;
  overflow: hidden;
}
#playOverlay {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 80px; height: 80px;
  background: rgba(0,0,0,0.5);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  z-index: 10;
}
#playOverlay:hover {
  background: rgba(233,69,96,0.7);
  transform: translate(-50%, -50%) scale(1.1);
}
#playOverlay svg { width: 36px; height: 36px; fill: white; margin-left: 4px; }

/* YouTube 风格进度条 */
.progress-container {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 28px;
  z-index: 20;
  cursor: pointer;
  display: flex;
  align-items: flex-end;
}
.progress-bar-bg {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.2);
  transition: height 0.1s;
  position: relative;
}
.progress-container:hover .progress-bar-bg {
  height: 6px;
}
.progress-bar-fill {
  height: 100%;
  background: #e94560;
  position: relative;
  transition: none;
}
.progress-bar-fill::after {
  content: '';
  position: absolute;
  right: -6px;
  top: 50%;
  transform: translateY(-50%) scale(0);
  width: 12px;
  height: 12px;
  background: #e94560;
  border-radius: 50%;
  transition: transform 0.1s;
}
.progress-container:hover .progress-bar-fill::after {
  transform: translateY(-50%) scale(1);
}
.progress-bar-buffered {
  position: absolute;
  top: 0; left: 0;
  height: 100%;
  background: rgba(255,255,255,0.15);
  pointer-events: none;
}
.progress-tooltip {
  position: absolute;
  bottom: 32px;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  color: #fff;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 0.75em;
  pointer-events: none;
  display: none;
  white-space: nowrap;
}
.progress-container:hover .progress-tooltip {
  display: block;
}

video, audio {
  max-width: 100%;
  max-height: 100%;
  outline: none;
}
.controls {
  display: flex; align-items: center; gap: 6px;
  margin-top: 8px; flex-wrap: wrap;
}
.btn {
  background: #0f3460; border: none; color: #eee;
  padding: 7px 12px; border-radius: 8px;
  cursor: pointer; font-size: 0.9em;
  transition: background 0.2s;
  display: flex; align-items: center; gap: 4px;
}
.btn:hover { background: #e94560; }
.btn-sm { padding: 5px 10px; font-size: 0.8em; }
.speed-group { display: flex; gap: 3px; margin-left: auto; }
.speed-btn {
  background: #0f3460; border: none; color: #aaa;
  padding: 5px 8px; border-radius: 5px;
  cursor: pointer; font-size: 0.8em;
  transition: all 0.2s;
}
.speed-btn:hover, .speed-btn.active { background: #e94560; color: #fff; }
.skip-btn {
  background: #533483; border: none; color: #eee;
  padding: 7px 10px; border-radius: 8px;
  cursor: pointer; font-size: 0.9em;
  transition: background 0.2s;
}
.skip-btn:hover { background: #7b2cbf; }
.time-display {
  color: #888; font-size: 0.85em;
  font-variant-numeric: tabular-nums;
  min-width: 100px; text-align: center;
}
.volume-control { display: flex; align-items: center; gap: 4px; }
.volume-control input[type="range"] { width: 60px; accent-color: #e94560; }
.shortcuts-bar {
  display: flex; flex-wrap: wrap; gap: 6px;
  align-items: center; font-size: 0.78em; color: #888;
  margin-top: 6px; padding: 6px 10px;
  background: rgba(255,255,255,0.03);
  border-radius: 6px;
}
.kbd {
  background: #0f3460; padding: 2px 6px;
  border-radius: 3px; font-family: monospace;
  font-size: 0.95em; color: #e94560;
  border: 1px solid #533483;
}
.top-bar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
}
.top-bar .fileName {
  flex: 1; color: #e94560; font-size: 0.85em;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* 右侧播放列表 */
.playlist-panel {
  width: 280px;
  flex-shrink: 0;
  background: #16213e;
  border-radius: 12px;
  padding: 12px;
  display: flex;
  flex-direction: column;
}
.playlist-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.playlist-header h3 {
  font-size: 0.9em; color: #888; font-weight: normal;
}
.playlist-header h3 span { color: #e94560; margin-left: 4px; }
.playlist-actions { display: flex; gap: 6px; }
.playlist {
  flex: 1;
  overflow-y: auto;
  border-radius: 8px;
  background: rgba(0,0,0,0.2);
}
.playlist::-webkit-scrollbar { width: 5px; }
.playlist::-webkit-scrollbar-thumb { background: #533483; border-radius: 3px; }
.playlist-item {
  display: flex; align-items: center;
  padding: 8px 10px;
  cursor: pointer;
  transition: background 0.15s;
  gap: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.playlist-item:last-child { border-bottom: none; }
.playlist-item:hover { background: rgba(255,255,255,0.05); }
.playlist-item.active { background: rgba(233,69,96,0.15); }
.playlist-item .index {
  color: #555; font-size: 0.75em;
  min-width: 16px; text-align: center;
}
.playlist-item.active .index { color: #e94560; }
.playlist-item .name {
  flex: 1; font-size: 0.82em; color: #aaa;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.playlist-item.active .name { color: #e94560; font-weight: 500; }
.playlist-item .type-icon { font-size: 0.8em; opacity: 0.6; }
.playlist-item .progress-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #533483;
  flex-shrink: 0;
}
.playlist-item.has-progress .progress-dot { background: #e94560; }
.playlist-item .remove-btn {
  opacity: 0; background: none; border: none;
  color: #666; cursor: pointer;
  font-size: 1em; padding: 0 2px;
  transition: all 0.15s;
}
.playlist-item:hover .remove-btn { opacity: 1; }
.playlist-item .remove-btn:hover { color: #e94560; }
.playlist-empty {
  text-align: center; padding: 24px;
  color: #555; font-size: 0.85em;
}
.playlist-stats {
  margin-top: 8px; padding-top: 8px;
  border-top: 1px solid rgba(255,255,255,0.06);
  font-size: 0.75em; color: #666;
  display: flex; justify-content: space-between;
}
</style>
</head>
<body>

<div class="main-layout">
  <!-- 左侧播放器 -->
  <div class="player-panel">
    <div class="drop-zone" id="dropZone">
      <div class="icon">📂</div>
      <p>拖拽视频或音频文件到这里</p>
      <p style="margin-top:8px; font-size:0.85em; color:#666">或点击选择文件（支持多选）</p>
    </div>
    <input type="file" id="fileInput" accept="video/*,audio/*" multiple style="display:none">

    <div id="mediaWrapper">
      <div class="top-bar">
        <span class="fileName" id="fileName"></span>
        <button class="btn btn-sm" onclick="fileInput.click()">＋ 添加</button>
      </div>
      <div id="mediaContainer"></div>

      <div class="shortcuts-bar">
        <span class="kbd">Space</span> 播放/暂停
        <span class="kbd">←→</span> 快进退
        <span class="kbd">N</span> 下一个 <span class="kbd">P</span> 上一个
        <span class="kbd">[ ]</span> 倍速
        <span class="kbd">↑↓</span> 音量 <span class="kbd">M</span> 静音
        <span style="margin-left:auto; color:#e94560; font-size:1.3em; font-weight:bold;" id="currentSpeed">1x</span>
      </div>

      <div class="controls">
        <button class="skip-btn" onclick="playPrev()">⏮</button>
        <button class="skip-btn" onclick="skip(-10)">⏪10</button>
        <button class="skip-btn" onclick="skip(-5)">⏪5</button>
        <button class="btn" id="playBtn" onclick="togglePlay()">▶</button>
        <button class="skip-btn" onclick="skip(5)">5⏩</button>
        <button class="skip-btn" onclick="skip(10)">10⏩</button>
        <button class="skip-btn" onclick="playNext()">⏭</button>

        <div class="volume-control">
          <span>🔊</span>
          <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)">
        </div>
        <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
      </div>

      <div class="controls">
        <span style="color:#888; font-size:0.85em;">倍速：</span>
        <div class="speed-group" id="speedGroup">
          <button class="speed-btn" onclick="setSpeed(0.5)">0.5x</button>
          <button class="speed-btn" onclick="setSpeed(0.75)">0.75x</button>
          <button class="speed-btn active" onclick="setSpeed(1)">1x</button>
          <button class="speed-btn" onclick="setSpeed(1.25)">1.25x</button>
          <button class="speed-btn" onclick="setSpeed(1.5)">1.5x</button>
          <button class="speed-btn" onclick="setSpeed(2)">2x</button>
          <button class="speed-btn" onclick="setSpeed(3)">3x</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 右侧播放列表 -->
  <div class="playlist-panel">
    <div class="playlist-header">
      <h3>播放列表 <span id="playlistCount">0</span></h3>
      <div class="playlist-actions">
        <button class="btn btn-sm" onclick="fileInput.click()">＋</button>
        <button class="btn btn-sm" onclick="clearPlaylist()" style="color:#888;">清空</button>
      </div>
    </div>
    <div class="playlist" id="playlist">
      <div class="playlist-empty">播放列表为空</div>
    </div>
    <div class="playlist-stats">
      <span id="statsLeft">-</span>
      <span id="statsTotal"></span>
    </div>
  </div>
</div>

<script>
// 播放列表
let playlist = [];
let currentIndex = -1;
let media = null;

// localStorage key
const STORAGE_KEY = 'local-player-progress';

// DOM
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const mediaWrapper = document.getElementById('mediaWrapper');
const mediaContainer = document.getElementById('mediaContainer');
const playBtn = document.getElementById('playBtn');
const timeDisplay = document.getElementById('timeDisplay');
const fileNameEl = document.getElementById('fileName');
const speedGroup = document.getElementById('speedGroup');
const volumeSlider = document.getElementById('volumeSlider');
const playlistEl = document.getElementById('playlist');
const playlistCount = document.getElementById('playlistCount');
const statsLeft = document.getElementById('statsLeft');
const statsTotal = document.getElementById('statsTotal');

// 读取保存的进度
function getSavedProgress(name) {
  try {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    return data[name] || 0;
  } catch { return 0; }
}

// 保存进度
function saveProgress(name, time) {
  try {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (time > 1) { // 超过1秒才保存
      data[name] = time;
    } else {
      delete data[name];
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch {}
}

// 清除进度
function clearProgress(name) {
  try {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    delete data[name];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch {}
}

// 添加文件到播放列表
function addFiles(files) {
  for (const file of files) {
    const name = file.name;
    playlist.push({
      file: file,
      name: name,
      url: URL.createObjectURL(file),
      isVideo: file.type.startsWith('video'),
      savedTime: getSavedProgress(name)
    });
  }
  renderPlaylist();
  if (currentIndex === -1 && playlist.length > 0) {
    playAtIndex(0);
  }
}

// 渲染播放列表
function renderPlaylist() {
  playlistCount.textContent = playlist.length;
  statsLeft.textContent = `剩余 ${playlist.length - currentIndex - 1} 个`;

  if (playlist.length === 0) {
    playlistEl.innerHTML = '<div class="playlist-empty">播放列表为空</div>';
    mediaWrapper.style.display = 'none';
    dropZone.style.display = 'flex';
    return;
  }
  mediaWrapper.style.display = 'flex';
  dropZone.style.display = 'none';

  playlistEl.innerHTML = playlist.map((item, i) => {
    const hasProgress = item.savedTime > 0;
    return `
    <div class="playlist-item ${i === currentIndex ? 'active' : ''} ${hasProgress ? 'has-progress' : ''}" onclick="playAtIndex(${i})">
      <span class="index">${i + 1}</span>
      <span class="type-icon">${item.isVideo ? '🎬' : '🎵'}</span>
      <span class="name" title="${item.name}${hasProgress ? ' (有上次进度)' : ''}">${item.name}</span>
      <span class="progress-dot" title="${hasProgress ? '有上次进度' : ''}"></span>
      <button class="remove-btn" onclick="event.stopPropagation(); removeFromPlaylist(${i})">✕</button>
    </div>`;
  }).join('');
}

// 播放指定索引
function playAtIndex(index) {
  if (index < 0 || index >= playlist.length) return;
  // 保存当前播放的进度
  if (currentIndex >= 0 && media) {
    saveProgress(playlist[currentIndex].name, media.currentTime);
  }

  currentIndex = index;
  const item = playlist[index];
  fileNameEl.textContent = item.name;
  mediaContainer.innerHTML = '';

  media = document.createElement(item.isVideo ? 'video' : 'audio');
  media.controls = false;
  media.style.maxWidth = '100%';
  media.style.maxHeight = '100%';
  media.style.cursor = 'pointer';
  media.src = item.url;
  media.addEventListener('click', () => togglePlay());
  mediaContainer.appendChild(media);

  // YouTube 风格进度条
  const progressHTML = `
    <div class="progress-container" id="progressContainer">
      <div class="progress-bar-bg">
        <div class="progress-bar-buffered" id="progressBuffered"></div>
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-tooltip" id="progressTooltip">0:00</div>
    </div>`;
  mediaContainer.insertAdjacentHTML('beforeend', progressHTML);

  const progressContainer = document.getElementById('progressContainer');
  const progressFill = document.getElementById('progressFill');
  const progressBuffered = document.getElementById('progressBuffered');
  const progressTooltip = document.getElementById('progressTooltip');

  // 进度条点击跳转
  progressContainer.addEventListener('click', e => {
    if (!media) return;
    const rect = progressContainer.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    media.currentTime = pct * media.duration;
  });

  // 进度条悬停提示
  progressContainer.addEventListener('mousemove', e => {
    if (!media || !media.duration) return;
    const rect = progressContainer.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    const time = pct * media.duration;
    progressTooltip.textContent = formatTime(time);
    progressTooltip.style.left = (pct * 100) + '%';
  });

  // Play overlay
  const overlay = document.createElement('div');
  overlay.id = 'playOverlay';
  overlay.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
  overlay.onclick = () => media.play();
  mediaContainer.appendChild(overlay);

  media.addEventListener('timeupdate', () => {
    updateTime();
    // 更新进度条
    if (media.duration) {
      progressFill.style.width = (media.currentTime / media.duration * 100) + '%';
    }
    // 每10秒自动保存进度
    if (media && Math.floor(media.currentTime) % 10 === 0) {
      saveProgress(item.name, media.currentTime);
    }
  });
  media.addEventListener('progress', () => {
    // 更新缓冲进度
    if (media.buffered.length > 0 && media.duration) {
      const buffered = media.buffered.end(media.buffered.length - 1);
      progressBuffered.style.width = (buffered / media.duration * 100) + '%';
    }
  });
  media.addEventListener('loadedmetadata', () => {
    updateTime();
    // 恢复上次播放位置
    if (item.savedTime > 0 && item.savedTime < media.duration - 2) {
      media.currentTime = item.savedTime;
      item.savedTime = 0; // 只恢复一次
    }
  });
  media.addEventListener('play', () => {
    playBtn.textContent = '⏸';
    overlay.style.display = 'none';
  });
  media.addEventListener('pause', () => {
    playBtn.textContent = '▶';
    overlay.style.display = 'flex';
    // 暂停时保存进度
    saveProgress(item.name, media.currentTime);
  });
  media.addEventListener('ended', () => {
    clearProgress(item.name); // 播完清除进度
    // 从列表中移除
    playlist.splice(currentIndex, 1);
    if (playlist.length === 0) {
      currentIndex = -1;
      media = null;
      mediaContainer.innerHTML = '';
      renderPlaylist();
    } else {
      if (currentIndex >= playlist.length) currentIndex = 0;
      renderPlaylist();
      playAtIndex(currentIndex);
    }
  });

  renderPlaylist();
  media.play();
}

// 从播放列表移除
function removeFromPlaylist(index) {
  const item = playlist[index];
  clearProgress(item.name);

  if (index === currentIndex) {
    playlist.splice(index, 1);
    if (playlist.length === 0) {
      currentIndex = -1;
      media = null;
      mediaContainer.innerHTML = '';
      renderPlaylist();
    } else {
      if (currentIndex >= playlist.length) currentIndex = 0;
      playAtIndex(currentIndex);
    }
  } else {
    playlist.splice(index, 1);
    if (index < currentIndex) currentIndex--;
    renderPlaylist();
  }
}

// 清空播放列表
function clearPlaylist() {
  // 清除所有进度
  playlist.forEach(item => clearProgress(item.name));
  playlist = [];
  currentIndex = -1;
  media = null;
  mediaContainer.innerHTML = '';
  renderPlaylist();
}

// 上一个
function playPrev() {
  if (currentIndex > 0) playAtIndex(currentIndex - 1);
}

// 下一个
function playNext() {
  if (currentIndex < playlist.length - 1) playAtIndex(currentIndex + 1);
}

// 播放控制
function togglePlay() {
  if (!media) return;
  media.paused ? media.play() : media.pause();
}

function skip(seconds) {
  if (!media) return;
  media.currentTime = Math.max(0, Math.min(media.duration, media.currentTime + seconds));
}

function setSpeed(rate) {
  if (!media) return;
  media.playbackRate = rate;
  document.getElementById('currentSpeed').textContent = rate + 'x';
  speedGroup.querySelectorAll('.speed-btn').forEach(btn => {
    btn.classList.toggle('active', parseFloat(btn.textContent) === rate);
  });
}

function setVolume(v) { if (media) media.volume = v; }

function updateTime() {
  if (!media) return;
  timeDisplay.textContent = formatTime(media.currentTime) + ' / ' + formatTime(media.duration);
}

function formatTime(s) {
  if (isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

// 拖拽 - 支持多文件
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files);
});
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => {
  if (e.target.files.length) addFiles(e.target.files);
  fileInput.value = '';
});

// 快捷键
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch(e.key) {
    case ' ': e.preventDefault(); togglePlay(); break;
    case 'ArrowLeft': skip(e.shiftKey ? -10 : -5); break;
    case 'ArrowRight': skip(e.shiftKey ? 10 : 5); break;
    case 'ArrowUp': e.preventDefault(); if(media) { volumeSlider.value = Math.min(1, media.volume + 0.1); setVolume(volumeSlider.value); } break;
    case 'ArrowDown': e.preventDefault(); if(media) { volumeSlider.value = Math.max(0, media.volume - 0.1); setVolume(volumeSlider.value); } break;
    case 'm': case 'M': if(media) media.muted = !media.muted; break;
    case '[': if(media) setSpeed(Math.max(0.25, media.playbackRate - 0.25)); break;
    case ']': if(media) setSpeed(Math.min(4, media.playbackRate + 0.25)); break;
    case 'n': case 'N': playNext(); break;
    case 'p': case 'P': playPrev(); break;
  }
});

// 页面关闭前保存进度
window.addEventListener('beforeunload', () => {
  if (currentIndex >= 0 && media) {
    saveProgress(playlist[currentIndex].name, media.currentTime);
  }
});
</script>
</body>
</html>
